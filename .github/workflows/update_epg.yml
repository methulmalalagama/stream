name: Update EPG every hour

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:

jobs:
  update-epg:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        persist-credentials: true

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: "8.2"

    - name: Run EPG update script
      run: php update_epg.php

    - name: Check if XML was created
      run: |
        if [ ! -f epg_fixed.xml ]; then
          echo "Error: epg_fixed.xml was not created!"
          exit 1
        fi

    - name: Deploy EPG to GitHub Pages
      uses: peaceiris/actions-gh-pages@v6
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: .
        keep_files: false
        include: epg_fixed.xml
